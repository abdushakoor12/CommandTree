version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"

  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: secret

  # Cache service
  redis:
    image: redis:7

  app-1:
    build: ./app
    depends_on:
      - db
      - redis

  cache_store:
    image: memcached:latest
    ports:
      - "11211:11211"

  # Worker service for background jobs
  worker_2:
    build: ./worker
    environment:
      QUEUE: default
